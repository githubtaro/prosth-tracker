<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="加工記録">
<title>加工記録</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: #fff; color: #1a1a1a; max-width: 540px; margin: 0 auto;
    min-height: 100vh; min-height: 100dvh;
  }
  .header { padding: 20px 20px 0; position: sticky; top: 0; background: #fff; z-index: 10; }
  .header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 2px; }
  .header p { font-size: 12px; color: #bbb; margin-bottom: 12px; }
  .tabs { display: flex; border-bottom: 1px solid #eee; }
  .tab {
    flex: 1; padding: 14px 0; border: none; border-bottom: 3px solid transparent;
    background: transparent; color: #999; font-weight: 500; font-size: 14px; cursor: pointer;
  }
  .tab.active { color: #1a6b4f; border-bottom-color: #1a6b4f; font-weight: 700; }
  .content { padding: 20px; }
  .label { font-size: 13px; color: #888; display: block; margin-bottom: 8px; }
  .field { margin-bottom: 20px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 10px 18px; border-radius: 10px; border: 2px solid #d0d0d0;
    background: #fff; color: #444; font-weight: 500; font-size: 15px;
    cursor: pointer; transition: border-color 0.15s, background-color 0.15s, color 0.15s;
    min-height: 44px; white-space: nowrap;
  }
  .chip.selected { border-color: #1a6b4f; background: #e8f5ee; color: #1a6b4f; font-weight: 700; }
  .chip.disabled { opacity: 0.3; pointer-events: none; }
  .date-input {
    font-size: 16px; padding: 10px 14px; border-radius: 10px;
    border: 2px solid #d0d0d0; width: 100%;
  }
  .qty-row { display: flex; align-items: center; gap: 16px; }
  .qty-btn {
    width: 48px; height: 48px; border-radius: 12px; border: 2px solid #d0d0d0;
    background: #fff; font-size: 22px; cursor: pointer; color: #444;
  }
  .qty-val { font-size: 28px; font-weight: 700; min-width: 40px; text-align: center; }
  .sub-field {
    margin-top: 12px; padding: 12px; border: 1px solid #e8e8e8;
    border-radius: 12px; background: #fafafa;
  }
  .sub-field-label {
    font-size: 13px; color: #666; display: block; margin-bottom: 8px; font-weight: 600;
  }
  .sub-field-note {
    font-size: 12px; color: #999; margin-top: 8px; line-height: 1.5;
  }
  .memo-input {
    font-size: 15px; padding: 10px 14px; border-radius: 10px;
    border: 2px solid #d0d0d0; width: 100%;
  }
  .btn-save {
    width: 100%; padding: 16px; border-radius: 12px; border: none;
    background: #1a6b4f; color: #fff; font-size: 17px; font-weight: 700;
    cursor: pointer; min-height: 52px;
  }
  .btn-export {
    width: 100%; padding: 14px; border-radius: 12px;
    border: 2px solid #1a6b4f; background: #fff; color: #1a6b4f;
    font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px;
  }
  .feedback { text-align: center; margin-top: 12px; font-size: 14px; font-weight: 600; }
  .feedback.ok { color: #1a6b4f; }
  .feedback.err { color: #c0392b; }
  .today-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .today-label { font-size: 14px; color: #888; }
  .today-total {
    font-size: 14px; font-weight: 700; color: #1a6b4f;
    background: #e8f5ee; padding: 4px 12px; border-radius: 8px;
  }
  .record-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; background: #f8f8f8; border-radius: 10px; margin-bottom: 8px;
  }
  .record-type { font-weight: 600; font-size: 15px; }
  .record-mat { color: #888; font-size: 13px; margin-left: 8px; }
  .record-shade { color: #b08d57; font-size: 13px; margin-left: 6px; }
  .record-machine { color: #2e86ab; font-size: 13px; margin-left: 6px; }
  .record-form { color: #7a6aad; font-size: 12px; margin-left: 6px; }
  .record-memo { color: #aaa; font-size: 12px; margin-left: 6px; }
  .record-qty { font-weight: 700; font-size: 16px; color: #1a6b4f; }
  .record-del {
    background: none; border: none; color: #ccc; font-size: 18px;
    cursor: pointer; padding: 4px 8px; margin-left: 10px;
  }
  .month-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 20px; }
  .month-chip {
    padding: 8px 16px; border-radius: 8px; white-space: nowrap;
    border: 2px solid #e0e0e0; background: #fff; color: #666;
    font-weight: 500; font-size: 14px; cursor: pointer; flex-shrink: 0;
  }
  .month-chip.selected { border-color: #1a6b4f; background: #e8f5ee; color: #1a6b4f; font-weight: 700; }
  .summary-box { background: #f4faf7; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
  .summary-title { font-size: 13px; color: #888; margin-bottom: 10px; }
  .summary-cols { display: flex; gap: 20px; flex-wrap: wrap; }
  .summary-col-title { font-size: 12px; color: #999; margin-bottom: 4px; }
  .summary-item { font-size: 14px; color: #333; }
  .summary-item-name { font-weight: 600; }
  .summary-item-count { color: #1a6b4f; margin-left: 6px; }
  .day-header {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 6px; border-bottom: 1px solid #eee; margin-bottom: 8px;
  }
  .day-date { font-weight: 700; font-size: 15px; color: #333; }
  .day-total { font-size: 13px; color: #1a6b4f; font-weight: 600; }
  .day-record { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; color: #555; }
  .day-record-qty { font-weight: 600; white-space: nowrap; }
  .day-group { margin-bottom: 16px; }
  .empty { text-align: center; padding: 60px 20px; color: #aaa; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }
  .hidden { display: none !important; }

  .install-hint {
    background: #fffbea; border: 1px solid #f0e6b8; border-radius: 10px;
    padding: 12px 16px; margin-bottom: 20px; font-size: 13px; color: #8a7530;
    line-height: 1.6;
  }
  .install-hint strong { color: #6b5a20; }
  .install-hint .close-hint {
    background: none; border: none; color: #bba840; font-size: 18px;
    float: right; cursor: pointer; margin: -4px -4px 0 0;
  }

  .form-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .form-radio {
    padding: 10px 18px; border-radius: 10px; border: 2px solid #d0d0d0;
    background: #fff; color: #444; font-weight: 500; font-size: 15px;
    cursor: pointer; transition: border-color 0.15s, background-color 0.15s, color 0.15s;
    min-height: 44px; white-space: nowrap;
  }
  .form-radio.selected { border-color: #6a5acd; background: #f0ecff; color: #5a4abf; font-weight: 700; }
  .size-select {
    font-size: 16px; padding: 10px 14px; border-radius: 10px;
    border: 2px solid #d0d0d0; background: #fff; min-height: 44px;
  }
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-box {
    background: #fff; border-radius: 16px; padding: 24px;
    max-width: 400px; width: 100%; max-height: 80vh; overflow-y: auto;
  }
  .modal-title {
    font-size: 17px; font-weight: 700; margin-bottom: 16px; color: #1a1a1a;
  }
  .modal-row {
    display: flex; justify-content: space-between; padding: 8px 0;
    border-bottom: 1px solid #f0f0f0; font-size: 14px;
  }
  .modal-row:last-of-type { border-bottom: none; }
  .modal-label { color: #888; }
  .modal-value { color: #1a1a1a; font-weight: 600; text-align: right; }
  .modal-warn { color: #c0392b; font-weight: 600; }
  .modal-buttons {
    display: flex; gap: 12px; margin-top: 20px;
  }
  .modal-btn {
    flex: 1; padding: 14px; border-radius: 12px; font-size: 16px;
    font-weight: 700; cursor: pointer; min-height: 48px; border: none;
  }
  .modal-btn-cancel { background: #f0f0f0; color: #666; }
  .modal-btn-ok { background: #1a6b4f; color: #fff; }
</style>
</head>
<body>

<div class="header">
  <h1>加工記録</h1>
  <p>補綴物の加工実績を記録</p>
  <div class="tabs">
    <button class="tab active" id="tab-entry" onclick="switchTab('entry')">入力</button>
    <button class="tab" id="tab-history" onclick="switchTab('history')">履歴</button>
    <button class="tab" id="tab-barlog" onclick="switchTab('barlog')">設備ログ</button>
  </div>
</div>

<div class="content" id="page-entry">

  <div class="install-hint" id="install-hint">
    <button class="close-hint" onclick="closeHint()">&times;</button>
    <strong>ホーム画面に追加するとアプリとして使えます</strong><br>
    Safari：共有ボタン →「ホーム画面に追加」
  </div>

  <div class="field">
    <label class="label">加工日</label>
    <input type="date" class="date-input" id="inp-date">
  </div>

  <div class="field">
    <label class="label">加工物</label>
    <div class="chips" id="chips-type"></div>
  </div>

  <div class="field">
    <label class="label">使用素材</label>
    <div class="chips" id="chips-material"></div>
  </div>

  <div class="field hidden" id="product-field">
    <label class="label">商品名</label>
    <div class="chips" id="chips-product"></div>
  </div>

  <div class="field">
    <label class="label">シェード</label>
    <div class="chips" id="chips-shade"></div>
  </div>

  <div class="field">
    <label class="label">加工形態・サイズ</label>
    <div class="form-row" id="form-type-row"></div>
  </div>

  <div class="field">
    <label class="label">加工機</label>
    <div class="chips" id="chips-machine"></div>
  </div>

  <div class="field">
    <label class="label" id="qty-label">歯数</label>
    <div class="qty-row">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <span class="qty-val" id="qty-val">1</span>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>

    <div class="sub-field hidden" id="veneer-section">
      <label class="sub-field-label">前装冠数（前装冠(Br) の内訳）</label>
      <div class="qty-row">
        <button class="qty-btn" onclick="changeVeneerQty(-1)">−</button>
        <span class="qty-val" id="veneer-qty-val">1</span>
        <button class="qty-btn" onclick="changeVeneerQty(1)">+</button>
      </div>
      <div class="sub-field-note">総歯数とは別に記録します。前装冠数は1以上・総歯数以下になるよう自動調整します。</div>
    </div>
  </div>

  <div class="field">
    <label class="label">メモ（詳細・備考等）</label>
    <input type="text" class="memo-input" id="inp-memo" placeholder="例: 備考・特記事項">
  </div>

  <button class="btn-save" onclick="saveRecord()">登録</button>
  <div class="feedback hidden" id="feedback"></div>

  <div class="hidden" id="today-section" style="margin-top:28px">
    <div class="today-header">
      <span class="today-label">今日の記録</span>
      <span class="today-total" id="today-total"></span>
    </div>
    <div id="today-list"></div>
  </div>
</div>

<div class="content hidden" id="page-history">
  <div class="month-chips" id="month-chips"></div>
  <div id="history-content"></div>
  <button class="btn-export" onclick="exportCSV()">CSVエクスポート</button>
  <button class="btn-export" style="border-color:#2e86ab;color:#2e86ab;margin-top:8px" onclick="document.getElementById('csv-import').click()">CSVインポート</button>
  <input type="file" id="csv-import" accept=".csv" style="display:none" onchange="importCSV(this)">
  <div class="feedback hidden" id="import-feedback"></div>
</div>

<div class="content hidden" id="page-barlog">
  <div class="field">
    <label class="label">交換日</label>
    <input type="date" class="date-input" id="bar-date">
  </div>

  <div class="field">
    <label class="label">加工機</label>
    <div class="chips" id="chips-bar-machine"></div>
  </div>

  <div class="field">
    <label class="label">バー種類</label>
    <select class="size-select" style="width:100%" id="sel-bar-type">
      <option value="">選択してください</option>
    </select>
  </div>

  <div class="field">
    <label class="label">交換理由</label>
    <div class="chips" id="chips-bar-reason"></div>
  </div>

  <div class="field">
    <label class="label">メモ</label>
    <input type="text" class="memo-input" id="bar-memo" placeholder="例: 備考">
  </div>

  <button class="btn-save" onclick="saveBarLog()">登録</button>
  <div class="feedback hidden" id="bar-feedback"></div>

  <div style="margin-top:28px">
    <div style="font-size:14px;color:#888;margin-bottom:12px">交換履歴</div>
    <div id="bar-log-list"></div>
  </div>

  <button class="btn-export" style="margin-top:16px" onclick="exportBarCSV()">バーログCSVエクスポート</button>
</div>

<div class="modal-overlay hidden" id="confirm-modal" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">登録内容の確認</div>
    <div id="confirm-body"></div>
    <div class="modal-buttons">
      <button class="modal-btn modal-btn-cancel" onclick="hideModal()">戻る</button>
      <button class="modal-btn modal-btn-ok" onclick="commitRecord()">登録</button>
    </div>
  </div>
</div>

<script>
const TYPES = ["クラウン", "ブリッジ", "前装冠(Cr)", "前装冠(Br)", "インレー", "支台", "3D模型片顎", "3D模型全顎"];
const MATERIALS = ["銀合金", "チタン", "CAD/CAM冠", "PMMA", "Peek冠", "セラスマート", "石膏", "造形レジン", "ジルコニア", "e-max", "WAX"];
const PRODUCT_NAMES = {
  "CAD/CAM冠": ["刀アベンシアP", "刀アベンシアN", "Mazic Duro"],
  "セラスマート": ["Prime", "300", "Layer"]
};
const SHADES = ["なし", "A1", "A2", "A3", "A3.5", "アイボリー", "ホワイト"];
const PEEK_SHADES = ["なし", "アイボリー", "ホワイト"];
const WAX_SHADES = ["なし"];
const NON_PEEK_SHADES = ["なし", "A1", "A2", "A3", "A3.5"];
const FORM_TYPES = ["なし", "ディスク", "ブロック"];
const DISC_SIZES = ["10", "12", "14", "16", "18", "20", "22", "25", "30"];
const BLOCK_SIZES = ["12", "14", "14L"];
const ALL_MACHINES = ["Wet1", "Wet2", "Dry1", "Dry2", "3Dプリンタ"];
const STORAGE_KEY = "prosth-records";

// Machine filtering rules
const MATERIAL_MACHINES = {
  "銀合金":    ["Wet1", "Wet2"],
  "チタン":    ["Wet1", "Wet2"],
  "e-max":     ["Wet1", "Wet2"],
  "Peek冠":    ["Wet1", "Wet2"],
  "CAD/CAM冠": ["Wet1", "Wet2", "Dry1", "Dry2"],
  "PMMA":      ["Wet1", "Wet2", "Dry1", "Dry2"],
  "WAX":       ["Wet1", "Wet2", "Dry1", "Dry2"],
  "ジルコニア": ["Dry1", "Dry2"],
  "石膏":       ["Dry1", "Dry2"],
  "造形レジン": ["3Dプリンタ"],
  "セラスマート": ["Wet1", "Wet2", "Dry1", "Dry2"]
};

// Type overrides (these take priority over material)
function getMachinesForSelection(type, material) {
  if (type === "3D模型片顎" || type === "3D模型全顎") return ["3Dプリンタ"];
  if (type === "支台") {
    if (material === "造形レジン") return ["3Dプリンタ"];
    if (material === "石膏") return ["Dry1", "Dry2"];
    return ["Dry1", "Dry2", "3Dプリンタ"];
  }
  if (material && MATERIAL_MACHINES[material]) return MATERIAL_MACHINES[material];
  return ALL_MACHINES;
}

let records = [];
let selected = { type: "", material: "", productName: "", shade: "なし", machine: "", formType: "なし", formSize: "" };
let quantity = 1;
let veneerQuantity = 1;
let selectedMonth = "";

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function monthStr(ds) { return ds.slice(0, 7); }
function formatDate(ds) { const p = ds.split("-"); return `${+p[1]}/${+p[2]}`; }
function formatMonth(ms) { const p = ms.split("-"); return `${p[0]}年${+p[1]}月`; }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function is3DType(t) { return t === "3D模型片顎" || t === "3D模型全顎"; }
function qtyUnit(t) { return is3DType(t) ? "件" : "歯"; }
function updateQtyLabel() {
  document.getElementById("qty-label").textContent = is3DType(selected.type) ? "件数" : "歯数";
}

function loadRecords() {
  try { records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
  catch { records = []; }
}
function persistRecords() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function switchTab(tab) {
  ["entry", "history", "barlog"].forEach(t => {
    document.getElementById("tab-" + t).className = tab === t ? "tab active" : "tab";
    document.getElementById("page-" + t).className = tab === t ? "content" : "content hidden";
  });
  if (tab === "history") renderHistory();
  if (tab === "barlog") renderBarLog();
}

function renderChips(containerId, items, field) {
  const el = document.getElementById(containerId);
  el.innerHTML = "";
  items.forEach(item => {
    const btn = document.createElement("button");
    btn.className = "chip" + (selected[field] === item ? " selected" : "");
    btn.textContent = item;
    btn.onclick = () => {
      selected[field] = item;
      renderChips(containerId, items, field);
      if (field === "type" || field === "material") {
        renderMachineChips();
        applyAutoSettings();
        if (field === "material") {
          renderShadeChips();
          renderProductChips();
        }
        if (field === "type") {
          renderVeneerSection();
          updateQtyLabel();
        }
      }
    };
    el.appendChild(btn);
  });
}

function renderMachineChips() {
  const allowed = getMachinesForSelection(selected.type, selected.material);
  // If current selection is no longer valid, clear it
  if (selected.machine && !allowed.includes(selected.machine)) {
    selected.machine = "";
  }
  // Auto-select if only one option
  if (allowed.length === 1) {
    selected.machine = allowed[0];
  }
  const el = document.getElementById("chips-machine");
  el.innerHTML = "";
  ALL_MACHINES.forEach(m => {
    const btn = document.createElement("button");
    const isAllowed = allowed.includes(m);
    btn.className = "chip" + (selected.machine === m ? " selected" : "") + (!isAllowed ? " disabled" : "");
    btn.textContent = m;
    if (isAllowed) {
      btn.onclick = () => { selected.machine = m; renderMachineChips(); };
    }
    el.appendChild(btn);
  });
}

function renderShadeChips() {
  const allowed = selected.material === "Peek冠" ? PEEK_SHADES : selected.material === "WAX" ? WAX_SHADES : NON_PEEK_SHADES;
  if (selected.shade && !allowed.includes(selected.shade)) {
    selected.shade = "なし";
  }
  const el = document.getElementById("chips-shade");
  el.innerHTML = "";
  SHADES.forEach(s => {
    const btn = document.createElement("button");
    const isAllowed = allowed.includes(s);
    btn.className = "chip" + (selected.shade === s ? " selected" : "") + (!isAllowed ? " disabled" : "");
    btn.textContent = s;
    if (isAllowed) {
      btn.onclick = () => { selected.shade = s; renderShadeChips(); };
    }
    el.appendChild(btn);
  });
}

function renderProductChips() {
  const field = document.getElementById("product-field");
  const products = PRODUCT_NAMES[selected.material];
  if (!products) {
    field.className = "field hidden";
    selected.productName = "";
    return;
  }
  field.className = "field";
  if (selected.productName && !products.includes(selected.productName)) {
    selected.productName = "";
  }
  const el = document.getElementById("chips-product");
  el.innerHTML = "";
  products.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "chip" + (selected.productName === p ? " selected" : "");
    btn.textContent = p;
    btn.onclick = () => { selected.productName = p; renderProductChips(); applyAutoSettings(); };
    el.appendChild(btn);
  });
}

function renderFormType() {
  const row = document.getElementById("form-type-row");
  let html = "";
  FORM_TYPES.forEach(ft => {
    html += `<button class="form-radio${selected.formType === ft ? " selected" : ""}" onclick="selectFormType('${ft}')">${ft}</button>`;
  });
  if (selected.formType === "ディスク") {
    html += `<select class="size-select" id="sel-size" onchange="selectSize(this.value)">
      <option value="">サイズ</option>
      ${DISC_SIZES.map(s => `<option value="${s}"${selected.formSize === s ? " selected" : ""}>${s}mm</option>`).join("")}
    </select>`;
  } else if (selected.formType === "ブロック") {
    html += `<select class="size-select" id="sel-size" onchange="selectSize(this.value)">
      <option value="">サイズ</option>
      ${BLOCK_SIZES.map(s => `<option value="${s}"${selected.formSize === s ? " selected" : ""}>${s}</option>`).join("")}
    </select>`;
  }
  row.innerHTML = html;
}

function applyAutoSettings() {
  // 刀アベンシアP → ブロック 14
  if (selected.productName === "刀アベンシアP") {
    selected.formType = "ブロック";
    selected.formSize = "14";
    renderFormType();
    return;
  }
  // 刀アベンシアN → ブロック 14L
  if (selected.productName === "刀アベンシアN") {
    selected.formType = "ブロック";
    selected.formSize = "14L";
    renderFormType();
    return;
  }
  // 支台 + 石膏 → ディスク 30mm
  if (selected.type === "支台" && selected.material === "石膏") {
    selected.formType = "ディスク";
    selected.formSize = "30";
    renderFormType();
    return;
  }
  // WAX → ディスク
  if (selected.material === "WAX") {
    selected.formType = "ディスク";
    selected.formSize = "";
    renderFormType();
    return;
  }
  // セラスマート → ブロック 14
  if (selected.material === "セラスマート") {
    selected.formType = "ブロック";
    selected.formSize = "14";
    renderFormType();
    return;
  }
  // Peek冠 or e-max → ブロック
  if (selected.material === "Peek冠" || selected.material === "e-max") {
    selected.formType = "ブロック";
    selected.formSize = "";
    renderFormType();
    return;
  }
  // チタン, 銀合金, PMMA, ジルコニア → ディスク
  if (["チタン", "銀合金", "PMMA", "ジルコニア"].includes(selected.material)) {
    selected.formType = "ディスク";
    selected.formSize = "";
    renderFormType();
    return;
  }
}

function selectFormType(ft) {
  selected.formType = ft;
  selected.formSize = "";
  renderFormType();
}

function selectSize(v) {
  selected.formSize = v;
}

function changeQty(delta) {
  quantity = Math.max(1, quantity + delta);
  document.getElementById("qty-val").textContent = quantity;
  if (selected.type === "前装冠(Br)" && veneerQuantity > quantity) {
    veneerQuantity = quantity;
    document.getElementById("veneer-qty-val").textContent = veneerQuantity;
  }
}

function changeVeneerQty(delta) {
  veneerQuantity = Math.max(1, Math.min(quantity, veneerQuantity + delta));
  document.getElementById("veneer-qty-val").textContent = veneerQuantity;
}

function renderVeneerSection() {
  const section = document.getElementById("veneer-section");
  if (selected.type === "前装冠(Br)") {
    section.className = "sub-field";
    if (veneerQuantity > quantity) veneerQuantity = quantity;
    if (veneerQuantity < 1) veneerQuantity = 1;
    document.getElementById("veneer-qty-val").textContent = veneerQuantity;
  } else {
    section.className = "sub-field hidden";
  }
}

function formatQtyLabel(r) {
  const u = qtyUnit(r.type);
  if (r.type === "前装冠(Br)" && (r.veneerQuantity || 0) > 0) {
    return `×${r.quantity}${u}（前装${r.veneerQuantity}）`;
  }
  return `×${r.quantity}${u}`;
}

function totalsLabel(toothCount, itemCount, veneerTotal) {
  const parts = [];
  if (toothCount > 0) parts.push(`${toothCount} 歯`);
  if (itemCount > 0) parts.push(`${itemCount} 件`);
  let s = "合計 " + parts.join(" / ");
  if (veneerTotal > 0) s += ` / 前装 ${veneerTotal} 歯`;
  return s;
}

function dayTotalLabel(toothCount, itemCount, veneerTotal) {
  const parts = [];
  if (toothCount > 0) parts.push(`${toothCount}歯`);
  if (itemCount > 0) parts.push(`${itemCount}件`);
  let s = parts.join(" / ");
  if (veneerTotal > 0) s += ` / 前装${veneerTotal}歯`;
  return s;
}

function formLabel(r) {
  if (!r.formType || r.formType === "なし") return "";
  let s = r.formType;
  if (r.formSize) s += " " + r.formSize + (r.formType === "ディスク" ? "mm" : "");
  return s;
}

function showFeedback(msg, ok) {
  const el = document.getElementById("feedback");
  el.textContent = msg;
  el.className = "feedback " + (ok ? "ok" : "err");
  setTimeout(() => { el.className = "feedback hidden"; }, 1800);
}

function saveRecord() {
  if (!selected.type || !selected.material) {
    showFeedback("加工物と素材を選択してください", false);
    return;
  }
  if (PRODUCT_NAMES[selected.material] && !selected.productName) {
    showFeedback("商品名を選択してください", false);
    return;
  }
  if (!selected.machine) {
    showFeedback("加工機を選択してください", false);
    return;
  }
  if (selected.type === "前装冠(Br)" && (veneerQuantity < 1 || veneerQuantity > quantity)) {
    showFeedback("前装冠数は1以上かつ総歯数以下にしてください", false);
    return;
  }
  // 確認モーダルを表示
  const fl = formLabel({ formType: selected.formType, formSize: selected.formSize });
  const formRequiredMaterials = ["チタン", "銀合金", "PMMA", "WAX", "ジルコニア", "Peek冠", "e-max", "CAD/CAM冠", "石膏", "セラスマート"];
  const formWarn = selected.formType === "なし" && formRequiredMaterials.includes(selected.material);
  const matDisplay = selected.productName ? selected.material + " / " + selected.productName : selected.material;

  let rows = [
    ["加工日", document.getElementById("inp-date").value],
    ["加工物", selected.type],
    ["使用素材", matDisplay],
    ["シェード", selected.shade],
    ["加工機", selected.machine],
    ["加工形態", fl || "なし", formWarn],
    [is3DType(selected.type) ? "件数" : "歯数", quantity]
  ];
  if (selected.type === "前装冠(Br)") {
    rows.push(["前装冠数", veneerQuantity]);
  }
  const memo = document.getElementById("inp-memo").value.trim();
  if (memo) rows.push(["メモ", memo]);

  let html = rows.map(r => {
    const warn = r[2] ? ' modal-warn' : '';
    const warnNote = r[2] ? '<div style="font-size:12px;color:#c0392b;margin-top:2px">⚠ 加工形態が未選択です</div>' : '';
    return `<div class="modal-row"><span class="modal-label">${esc(r[0])}</span><span class="modal-value${warn}">${esc(String(r[1]))}${warnNote}</span></div>`;
  }).join("");
  document.getElementById("confirm-body").innerHTML = html;
  document.getElementById("confirm-modal").className = "modal-overlay";
}

function hideModal() {
  document.getElementById("confirm-modal").className = "modal-overlay hidden";
}

function closeModal(e) {
  if (e.target === document.getElementById("confirm-modal")) hideModal();
}

function commitRecord() {
  hideModal();
  const rec = {
    id: genId(),
    date: document.getElementById("inp-date").value,
    type: selected.type,
    material: selected.material,
    productName: selected.productName || "",
    shade: selected.shade,
    machine: selected.machine,
    formType: selected.formType,
    formSize: selected.formSize,
    quantity: quantity,
    veneerQuantity: selected.type === "前装冠(Br)" ? veneerQuantity : 0,
    memo: document.getElementById("inp-memo").value.trim(),
    createdAt: new Date().toISOString()
  };
  records.push(rec);
  persistRecords();

  selected.type = "";
  selected.material = "";
  selected.productName = "";
  selected.shade = "なし";
  selected.machine = "";
  selected.formType = "なし";
  selected.formSize = "";
  quantity = 1;
  veneerQuantity = 1;

  document.getElementById("veneer-qty-val").textContent = "1";

  renderChips("chips-material", MATERIALS, "material");
  renderProductChips();
  renderShadeChips();
  renderMachineChips();
  renderFormType();
  renderVeneerSection();
  updateQtyLabel();

  renderToday();
}

function renderToday() {
  const today = document.getElementById("inp-date").value;
  const todayRecs = records.filter(r => r.date === today);
  const section = document.getElementById("today-section");
  if (todayRecs.length === 0) { section.className = "hidden"; return; }
  section.className = "";

  const toothCount = todayRecs.filter(r => !is3DType(r.type)).reduce((s, r) => s + r.quantity, 0);
  const itemCount = todayRecs.filter(r => is3DType(r.type)).reduce((s, r) => s + r.quantity, 0);
  const veneerTotal = todayRecs.reduce((s, r) => s + (r.veneerQuantity || 0), 0);
  document.getElementById("today-total").textContent = totalsLabel(toothCount, itemCount, veneerTotal);

  const list = document.getElementById("today-list");
  list.innerHTML = todayRecs.map(r => {
    const fl = formLabel(r);
    return `<div class="record-row">
      <div>
        <span class="record-type">${esc(r.type)}</span>
        <span class="record-mat">${esc(r.material)}${r.productName ? " / " + esc(r.productName) : ""}</span>
        ${r.shade && r.shade !== "なし" ? `<span class="record-shade">${esc(r.shade)}</span>` : ""}
        ${r.machine ? `<span class="record-machine">${esc(r.machine)}</span>` : ""}

        <span class="record-qty">${formatQtyLabel(r)}</span>
        <button class="record-del" onclick="deleteRecord('${r.id}')">✕</button>

    </div>`;

}

function deleteRecord(id) {
  records = records.filter(r => r.id !== id);
  persistRecords();
  renderToday();
}

function renderHistory() {
  const months = [...new Set(records.map(r => monthStr(r.date)))].sort().reverse();
  if (!months.length) {
    document.getElementById("month-chips").innerHTML = "";
    document.getElementById("history-content").innerHTML = `
      <div class="empty"><div class="empty-icon">📋</div><div class="empty-text">まだ記録がありません</div></div>`;
    return;
  }
  if (!selectedMonth || !months.includes(selectedMonth)) selectedMonth = months[0];

  document.getElementById("month-chips").innerHTML = months.map(m =>
    `<button class="month-chip${selectedMonth === m ? " selected" : ""}" onclick="selectMonth('${m}')">${formatMonth(m)}</button>`
  ).join("");

  const filtered = records.filter(r => monthStr(r.date) === selectedMonth);
  const dates = [...new Set(filtered.map(r => r.date))].sort().reverse();

  const typeCounts = {}, matCounts = {}, machineCounts = {};
  let toothCount = 0, itemCount = 0, veneerTotal = 0;
  filtered.forEach(r => {
    typeCounts[r.type] = (typeCounts[r.type] || 0) + r.quantity;
    matCounts[r.material] = (matCounts[r.material] || 0) + r.quantity;
    if (r.machine) machineCounts[r.machine] = (machineCounts[r.machine] || 0) + r.quantity;
    if (is3DType(r.type)) { itemCount += r.quantity; } else { toothCount += r.quantity; }
    veneerTotal += (r.veneerQuantity || 0);
  });

  const sortedEntries = (obj) => Object.entries(obj).sort((a,b) => b[1] - a[1]);

  let html = `<div class="summary-box">
    <div class="summary-title">月間サマリー（${totalsLabel(toothCount, itemCount, veneerTotal)}）</div>
    <div class="summary-cols">
      <div>
        <div class="summary-col-title">種類別</div>
        ${sortedEntries(typeCounts).map(([k,v]) => `<div class="summary-item"><span class="summary-item-name">${esc(k)}</span><span class="summary-item-count">${v}</span></div>`).join("")}
      </div>
      <div>
        <div class="summary-col-title">素材別</div>
        ${sortedEntries(matCounts).map(([k,v]) => `<div class="summary-item"><span class="summary-item-name">${esc(k)}</span><span class="summary-item-count">${v}</span></div>`).join("")}
      </div>
      <div>
        <div class="summary-col-title">加工機別</div>
        ${sortedEntries(machineCounts).map(([k,v]) => `<div class="summary-item"><span class="summary-item-name">${esc(k)}</span><span class="summary-item-count">${v}</span></div>`).join("")}
      </div>
      ${veneerTotal > 0 ? `<div>
        <div class="summary-col-title">前装冠(Br) 内訳</div>
        <div class="summary-item"><span class="summary-item-name">前装歯数</span><span class="summary-item-count">${veneerTotal}</span></div>
      </div>` : ""}
    </div>
  </div>`;

  dates.forEach(d => {
    const dayRecs = filtered.filter(r => r.date === d);
    const dayTooth = dayRecs.filter(r => !is3DType(r.type)).reduce((s,r) => s + r.quantity, 0);
    const dayItem = dayRecs.filter(r => is3DType(r.type)).reduce((s,r) => s + r.quantity, 0);
    const dayVeneerTotal = dayRecs.reduce((s,r) => s + (r.veneerQuantity || 0), 0);
    html += `<div class="day-group">
      <div class="day-header">
        <span class="day-date">${formatDate(d)}</span>
        <span class="day-total">${dayTotalLabel(dayTooth, dayItem, dayVeneerTotal)}</span>
      </div>
      ${dayRecs.map(r => {
        const fl = formLabel(r);
        const tm = r.createdAt ? new Date(r.createdAt).toLocaleTimeString("ja-JP", {hour:"2-digit",minute:"2-digit"}) : "";
        return `<div class="day-record">
          <span>${tm ? `<span style="color:var(--color-text-tertiary,#bbb);font-size:12px;margin-right:6px">${tm}</span>` : ""}${esc(r.type)} / ${esc(r.material)}${r.productName ? " / " + esc(r.productName) : ""}${r.shade && r.shade !== "なし" ? ` / ${esc(r.shade)}` : ""}${r.machine ? ` [${esc(r.machine)}]` : ""}${fl ? ` [${esc(fl)}]` : ""}${r.memo ? ` (${esc(r.memo)})` : ""}</span>

        </div>`;
      }).join("")}

  });

  document.getElementById("history-content").innerHTML = html;
}

function exportCSV() {
  const header = "加工日,加工物,使用素材,商品名,シェード,加工機,加工形態,サイズ,数量,前装冠数,メモ,登録日時\n";
  const rows = [...records].sort((a,b) => a.date.localeCompare(b.date))
    .map(r => `${r.date},${r.type},${r.material},${r.productName||""},${r.shade||"なし"},${r.machine||""},${r.formType||"なし"},${r.formSize||""},${r.quantity},${r.veneerQuantity||0},"${(r.memo||"").replace(/"/g,'""')}",${r.createdAt}`)
    .join("\n");
  const blob = new Blob(["\uFEFF" + header + rows], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `加工記録_${todayStr()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function importCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      let text = e.target.result;
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
      const lines = text.split("\n").filter(l => l.trim());
      if (lines.length < 2) {
        showImportFeedback("データがありません", false);
        return;
      }
      const header = lines[0];
      const hasProductName = header.includes("商品名");
      const existingIds = new Set(records.map(r => r.createdAt));
      let imported = 0, skipped = 0;
      for (let i = 1; i < lines.length; i++) {
        const cols = parseCSVLine(lines[i]);
        const minCols = hasProductName ? 12 : 11;
        if (cols.length < minCols) { skipped++; continue; }
        let rec;
        if (hasProductName) {
          const createdAt = cols[11].trim();
          if (existingIds.has(createdAt)) { skipped++; continue; }
          rec = {
            id: genId(),
            date: cols[0].trim(),
            type: cols[1].trim(),
            material: cols[2].trim(),
            productName: cols[3].trim() || "",
            shade: cols[4].trim() || "なし",
            machine: cols[5].trim() || "",
            formType: cols[6].trim() || "なし",
            formSize: cols[7].trim() || "",
            quantity: parseInt(cols[8]) || 1,
            veneerQuantity: parseInt(cols[9]) || 0,
            memo: cols[10].trim(),
            createdAt: createdAt
          };
        } else {
          const createdAt = cols[10].trim();
          if (existingIds.has(createdAt)) { skipped++; continue; }
          rec = {
            id: genId(),
            date: cols[0].trim(),
            type: cols[1].trim(),
            material: cols[2].trim(),
            productName: "",
            shade: cols[3].trim() || "なし",
            machine: cols[4].trim() || "",
            formType: cols[5].trim() || "なし",
            formSize: cols[6].trim() || "",
            quantity: parseInt(cols[7]) || 1,
            veneerQuantity: parseInt(cols[8]) || 0,
            memo: cols[9].trim(),
            createdAt: createdAt
          };
        }
        if (!rec.date || !rec.type || !rec.material) { skipped++; continue; }
        records.push(rec);
        existingIds.add(rec.createdAt);
        imported++;
      }
      persistRecords();
      renderHistory();
      renderToday();
      showImportFeedback(`${imported}件インポート${skipped > 0 ? `（${skipped}件スキップ）` : ""}`, true);
    } catch(err) {
      showImportFeedback("読み込みエラー: " + err.message, false);
    }
    input.value = "";
  };
  reader.readAsText(file, "UTF-8");
}

function parseCSVLine(line) {
  const cols = [];
  let cur = "", inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuote) {
      if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') { inQuote = false; }
      else { cur += c; }
    } else {
      if (c === '"') { inQuote = true; }
      else if (c === ',') { cols.push(cur); cur = ""; }
      else { cur += c; }
    }
  }
  cols.push(cur);
  return cols;
}

function showImportFeedback(msg, ok) {
  const el = document.getElementById("import-feedback");
  el.textContent = msg;
  el.className = "feedback " + (ok ? "ok" : "err");
  setTimeout(() => { el.className = "feedback hidden"; }, 3000);
}

    btn.className = "chip" + (barSelected.reason === r ? " selected" : "");
    btn.textContent = r;
    btn.onclick = () => { barSelected.reason = r; renderBarReasonChips(); };
    el.appendChild(btn);
  });
}

function renderBarTypeSelect() {
  const sel = document.getElementById("sel-bar-type");
  sel.innerHTML = '<option value="">選択してください</option>';
  const seriesOrder = ["PMMA/WAX", "HC", "Metal", "Zr/PMMA/WAX", "Zr"];
  seriesOrder.forEach(series => {
    const burs = BAR_TYPES.filter(b => b.series === series);
    if (burs.length === 0) return;
    const grp = document.createElement("optgroup");
    grp.label = series;
    burs.forEach(b => {
      const opt = document.createElement("option");
      opt.value = b.code;
      opt.textContent = b.name + (b.lifetime ? "  (MAX " + b.lifetime + ")" : "");
      grp.appendChild(opt);
    });
    sel.appendChild(grp);
  });
}

function showBarFeedback(msg, ok) {
  const el = document.getElementById("bar-feedback");
  el.textContent = msg;
  el.className = "feedback " + (ok ? "ok" : "err");
  setTimeout(() => { el.className = "feedback hidden"; }, 1800);
}

function saveBarLog() {
  const barCode = document.getElementById("sel-bar-type").value;
  if (!barSelected.machine) { showBarFeedback("加工機を選択してください", false); return; }
  if (!barCode) { showBarFeedback("バー種類を選択してください", false); return; }
  if (!barSelected.reason) { showBarFeedback("交換理由を選択してください", false); return; }

  const bar = BAR_TYPES.find(b => b.code === barCode);
  const log = {
    id: genId(),
    date: document.getElementById("bar-date").value,
    machine: barSelected.machine,
    barCode: bar.code,
    barName: bar.name,
    barSeries: bar.series,
    barLifetime: bar.lifetime || "",
    reason: barSelected.reason,
    memo: document.getElementById("bar-memo").value.trim(),
    createdAt: new Date().toISOString()
  };
  barLogs.push(log);
  persistBarLogs();

  barSelected.machine = "";
  barSelected.reason = "";
  document.getElementById("sel-bar-type").value = "";
  document.getElementById("bar-memo").value = "";
  renderBarMachineChips();
  renderBarReasonChips();

  showBarFeedback("登録しました", true);
  renderBarLog();
}

function renderBarLog() {
  const list = document.getElementById("bar-log-list");
  if (barLogs.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🔧</div><div class="empty-text">まだ交換記録がありません</div></div>';
    return;
  }
  const sorted = [...barLogs].sort((a, b) => b.createdAt.localeCompare(a.createdAt));
  list.innerHTML = sorted.map(l => {
    const tm = l.createdAt ? new Date(l.createdAt).toLocaleTimeString("ja-JP", {hour:"2-digit",minute:"2-digit"}) : "";
    const dateStr = l.date ? formatDate(l.date) : "";
    return `<div class="record-row">
      <div>
        <span style="font-size:12px;color:#bbb;margin-right:6px">${dateStr} ${tm}</span>
        <span class="record-type">${esc(l.barName)}</span>
        <span class="record-machine">${esc(l.machine)}</span>
        <span style="color:#c0392b;font-size:12px;margin-left:6px">${esc(l.reason)}</span>
        ${l.memo ? `<span class="record-memo">(${esc(l.memo)})</span>` : ""}
      </div>
      <div>
        <button onclick="deleteBarLog('${l.id}')" style="background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:2px 6px">✕</button>
      </div>
    </div>`;
  }).join("");
}

function deleteBarLog(id) {
  if (!confirm("この交換記録を削除しますか？")) return;
  barLogs = barLogs.filter(l => l.id !== id);
  persistBarLogs();
  renderBarLog();
}

function exportBarCSV() {
  const header = "交換日,加工機,バー種類,商品コード,シリーズ,MAX寿命,交換理由,メモ,登録日時\n";
  const rows = [...barLogs].sort((a,b) => a.date.localeCompare(b.date))
    .map(l => `${l.date},${l.machine},${l.barName},${l.barCode},${l.barSeries},${l.barLifetime||""},${l.reason},"${(l.memo||"").replace(/"/g,'""')}",${l.createdAt}`)
    .join("\n");
  const blob = new Blob(["\uFEFF" + header + rows], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `バー交換記録_${todayStr()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function closeHint() { document.getElementById("install-hint").className = "hidden"; }
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function migrateData() {
  let changed = false;
  // セラスマート300 → セラスマート + productName
  const smRecs = records.filter(r => r.material === "セラスマート300").sort((a, b) => a.createdAt.localeCompare(b.createdAt));
  if (smRecs.length > 0) {
    const mapping = ["300", "Prime"]; // 1件目=300, 2件目=Prime, 3件目以降=Layer
    smRecs.forEach((r, i) => {
      r.material = "セラスマート";
      r.productName = i < mapping.length ? mapping[i] : "Layer";
    });
    changed = true;
  }
  // productNameフィールドがないレコードに空文字を補完
  records.forEach(r => {
    if (r.productName === undefined) {
      r.productName = "";
      changed = true;
    }
  });
  if (changed) persistRecords();
}

loadRecords();
migrateData();
loadBarLogs();
document.getElementById("inp-date").value = todayStr();
document.getElementById("bar-date").value = todayStr();
renderChips("chips-type", TYPES, "type");
renderChips("chips-material", MATERIALS, "material");
renderProductChips();
renderShadeChips();
renderMachineChips();
renderFormType();
renderVeneerSection();
updateQtyLabel();
renderToday();
renderBarMachineChips();
renderBarReasonChips();
renderBarTypeSelect();
if (window.navigator.standalone) document.getElementById("install-hint").className = "hidden";
</script>
